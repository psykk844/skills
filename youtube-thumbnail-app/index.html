<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nano Banana Pro - Thumbnail Engine</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <header>
            <h1>Nano Banana Pro <span class="badge">Engine</span></h1>
            <p>Next-Gen YouTube Thumbnail Generator</p>
        </header>

        <main class="container">
            <!-- Left panel: Controls -->
            <section class="controls glass-panel">
                <h2>1. Setup Inputs</h2>

                <div class="upload-group">
                    <label>Upload Final Template</label>
                    <div class="drop-zone" id="template-drop">
                        <span>+ Drag & Drop Template</span>
                    </div>
                </div>



                <div class="input-group">
                    <label>Iteration Prompt</label>
                    <textarea id="prompt-input" rows="4"
                        placeholder="E.g., Swap the face in the template exactly as is..."></textarea>
                </div>

                <button id="generate-btn" class="glow-btn">Generate Version 1</button>
            </section>

            <!-- Right panel: Canvas / Output -->
            <section class="canvas glass-panel">
                <div class="canvas-header">
                    <h2>Output Canvas</h2>
                    <span class="version-tag">Draft v1</span>
                </div>

                <div class="output-wrapper" id="output-area">
                    <div class="placeholder-content">
                        <div class="spinner hidden" id="loading-spinner"></div>
                        <p id="status-text">Ready to generate your stunning thumbnail.</p>
                    </div>
                    <img id="result-img" class="hidden" src="" alt="Generated Thumbnail" />
                </div>

                <div class="iteration-controls">
                    <input type="text" id="refine-input" placeholder="Change this, change that..." />
                    <button id="refine-btn" class="glow-btn small">Iterate</button>
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="./main.js"></script>
</body>

</html>
